<!DOCTYPE html>

<head>
	<title>Configure Last.fm Widget</title>
	<meta charset="UTF-8">
	<link rel="shortcut icon" href="#" />
	<link rel="stylesheet" href="./style.css" />
</head>

<body>
	<div id="mainContainer">

		<div id="panel">
			<div id="headline">Last.fm Widget Setup</div>
			<div id="subhead">Enter your API key and username to launch the overlay.</div>
			<label class="fieldLabel" for="api_key_box">API Key</label>
			<input type="text" id="api_key_box" placeholder="e.g. a1b2c3d4..." autocomplete="off">
			<label class="fieldLabel" for="username_box">Username</label>
			<input type="text" id="username_box" placeholder="your-lastfm-username" autocomplete="off">
			<div id="optionalTitle">Optional settings</div>
			<label class="fieldLabel" for="duration_box">Auto-hide after (seconds)</label>
			<input type="number" id="duration_box" placeholder="Leave empty to keep visible" min="1" step="1">
			<label id="toggleRow" for="hide_album_art_box">
				<input type="checkbox" id="hide_album_art_box">
				<span>Hide album art</span>
			</label>
			<button id="launchButton" onclick="LaunchWidget()">Launch Widget</button>
			<button id="instructionsButton" onclick="OpenInstructions()">Get API Key</button>
		</div>
	</div>
</body>

<script src="./script.js"></script>
